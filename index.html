<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --tierra: #7B3F1A;
    --barro: #C47B3A;
    --crema: #F5EDD6;
    --lago: #2A7DA6;
    --lago-oscuro: #1A4E6A;
    --verde: #3A6B4A;
    --noche: #0E0A05;
    --dorado: #D4A843;
    --dorado-claro: #F0C96A;
    --card-bg: rgba(14,10,5,0.92);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; height:100%;
    font-family:'Nunito', sans-serif;
    background: var(--noche);
    overflow: hidden;
  }

  /* ── HEADER ── */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    height: 56px;
    background: linear-gradient(135deg, rgba(14,10,5,0.97) 0%, rgba(30,18,8,0.97) 100%);
    border-bottom: 1px solid rgba(212,168,67,0.3);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1rem;
    backdrop-filter: blur(10px);
  }

  #header .logo {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  #header .logo-icon {
    width: 36px; height: 36px;
    background: radial-gradient(circle at 30% 30%, var(--dorado-claro), var(--barro));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    box-shadow: 0 0 12px rgba(212,168,67,0.5);
    animation: pulseGlow 3s infinite;
  }

  #header h1 {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--dorado);
    letter-spacing: 0.05em;
    line-height: 1.1;
  }

  #header h1 span {
    display: block;
    font-size: 0.55rem;
    color: rgba(212,168,67,0.5);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 400;
  }

  #counter {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    text-align: right;
    line-height: 1.4;
  }

  #counter strong {
    color: var(--dorado);
    font-size: 1rem;
    display: block;
  }

  /* ── MAP ── */
  #map {
    position: fixed;
    top: 56px; left: 0; right: 0;
    bottom: 0;
    z-index: 1;
  }

  /* Custom Leaflet tiles styling */
  .leaflet-tile-pane { filter: saturate(1.1) brightness(0.95); }

  /* ── MARKER PINS ── */
  .poi-pin {
    position: relative;
    cursor: pointer;
  }

  .pin-outer {
    width: 44px; height: 44px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5), 0 0 0 3px rgba(255,255,255,0.15);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: pinFloat 3s ease-in-out infinite;
  }

  .pin-outer:hover {
    transform: rotate(-45deg) scale(1.2);
    box-shadow: 0 8px 25px rgba(0,0,0,0.6), 0 0 20px currentColor;
  }

  .pin-inner {
    transform: rotate(45deg);
    font-size: 1.3rem;
    line-height: 1;
  }

  .pin-pulse {
    position: absolute;
    bottom: -4px; left: 50%;
    transform: translateX(-50%);
    width: 10px; height: 10px;
    border-radius: 50%;
    animation: pingPulse 2s infinite;
  }

  /* Pin colors by category */
  .cat-plaza .pin-outer   { background: linear-gradient(135deg, #C47B3A, #8B4A1A); color: rgba(212,168,67,0.8); }
  .cat-plaza .pin-pulse   { background: #C47B3A; }
  .cat-iglesia .pin-outer { background: linear-gradient(135deg, #7B5EA7, #4A3070); }
  .cat-iglesia .pin-pulse { background: #7B5EA7; }
  .cat-cultura .pin-outer { background: linear-gradient(135deg, #2A7DA6, #1A4E6A); }
  .cat-cultura .pin-pulse { background: #2A7DA6; }
  .cat-natura .pin-outer  { background: linear-gradient(135deg, #3A7A4A, #1F4A2A); }
  .cat-natura .pin-pulse  { background: #3A7A4A; }
  .cat-lago .pin-outer    { background: linear-gradient(135deg, #1A9ECC, #0D6A8A); }
  .cat-lago .pin-pulse    { background: #1A9ECC; }

  /* ── DETAIL CARD (bottom sheet) ── */
  #detail-card {
    position: fixed;
    bottom: -100%;
    left: 0; right: 0;
    z-index: 2000;
    background: var(--card-bg);
    border-top: 1px solid rgba(212,168,67,0.25);
    border-radius: 24px 24px 0 0;
    padding: 0 1.2rem 2rem;
    transition: bottom 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    backdrop-filter: blur(20px);
    max-height: 80vh;
    overflow-y: auto;
  }

  #detail-card.open { bottom: 0; }

  .card-handle {
    width: 40px; height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    margin: 12px auto 16px;
  }

  .card-category {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.25rem 0.8rem;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 0.7rem;
  }

  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 1.4rem;
    color: var(--dorado);
    margin-bottom: 0.3rem;
    line-height: 1.2;
  }

  .card-subtitle {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.05em;
    margin-bottom: 1rem;
  }

  .card-divider {
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(212,168,67,0.3), transparent);
    margin: 0.8rem 0;
  }

  .card-desc {
    font-size: 0.88rem;
    color: rgba(255,255,255,0.75);
    line-height: 1.8;
    margin-bottom: 1rem;
  }

  .card-tip {
    background: rgba(212,168,67,0.08);
    border: 1px solid rgba(212,168,67,0.2);
    border-radius: 12px;
    padding: 0.8rem 1rem;
    font-size: 0.82rem;
    color: var(--dorado-claro);
    line-height: 1.6;
    margin-bottom: 1rem;
  }

  .card-tip::before {
    content: '💡 ';
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .meta-chip {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 0.3rem 0.8rem;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.6);
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .btn-close {
    width: 100%;
    padding: 0.9rem;
    border: 1px solid rgba(212,168,67,0.3);
    background: rgba(212,168,67,0.1);
    color: var(--dorado);
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-close:hover {
    background: rgba(212,168,67,0.2);
  }

  /* ── LEGEND ── */
  #legend {
    position: fixed;
    bottom: 16px; right: 12px;
    z-index: 500;
    background: rgba(14,10,5,0.9);
    border: 1px solid rgba(212,168,67,0.2);
    border-radius: 14px;
    padding: 0.8rem;
    backdrop-filter: blur(10px);
    font-size: 0.72rem;
    color: rgba(255,255,255,0.6);
    min-width: 130px;
  }

  #legend h4 {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: var(--dorado);
    letter-spacing: 0.1em;
    margin-bottom: 0.6rem;
    text-transform: uppercase;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.4rem;
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── OVERLAY for backdrop ── */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1999;
    background: rgba(0,0,0,0.5);
  }

  #overlay.active { display: block; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    top: 70px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--dorado);
    color: var(--noche);
    padding: 0.5rem 1.2rem;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 700;
    z-index: 3000;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── ANIMATIONS ── */
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 12px rgba(212,168,67,0.5); }
    50%       { box-shadow: 0 0 24px rgba(212,168,67,0.9); }
  }

  @keyframes pinFloat {
    0%, 100% { margin-top: 0; }
    50%       { margin-top: -5px; }
  }

  @keyframes pingPulse {
    0%   { transform: translateX(-50%) scale(1); opacity: 0.8; }
    100% { transform: translateX(-50%) scale(3); opacity: 0; }
  }

  /* Leaflet overrides */
  .leaflet-popup { display: none !important; }
  .leaflet-control-attribution { font-size: 9px !important; }
  .leaflet-control-zoom {
    border: none !important;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3) !important;
  }
  .leaflet-control-zoom a {
    background: rgba(14,10,5,0.92) !important;
    color: var(--dorado) !important;
    border-color: rgba(212,168,67,0.25) !important;
    width: 36px !important; height: 36px !important;
    line-height: 36px !important; font-size: 1.1rem !important;
  }
  .leaflet-tile-pane { filter: saturate(0.85) brightness(1.02); }

  .pin-label {
    position: absolute;
    top: 52px; left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-family: 'Nunito', sans-serif;
    font-size: 10px; font-weight: 700;
    color: #fff;
    background: rgba(14,10,5,0.82);
    border: 1px solid rgba(212,168,67,0.35);
    border-radius: 6px;
    padding: 2px 6px;
    pointer-events: none;
    backdrop-filter: blur(4px);
    max-width: 110px;
    overflow: hidden; text-overflow: ellipsis; text-align: center;
  }
</style>
</head>

  maxZoom: 19
});

// CartoDB Voyager — clean, Google Maps-like style with street names in Spanish
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// ── CREATE CUSTOM MARKERS ─────────────────────────────────────────────────
function createIcon(lugar) {
  // Short label: first meaningful words, max ~16 chars
  const shortName = lugar.nombre.length > 18
    ? lugar.nombre.replace(/^(Plaza|Basílica de|Templo y Colegio de la|Museo de Artes e Industrias|Mirador El|Muelle|Casa de los|Isla de)\s*/i, '').split(' ').slice(0,3).join(' ')
    : lugar.nombre;

  const html = `
    <div class="poi-pin cat-${lugar.cat}" style="position:relative;width:44px;">
      <div class="pin-outer">
        <div class="pin-inner">${lugar.emoji}</div>
      </div>
      <div class="pin-pulse"></div>
      <div class="pin-label">${shortName}</div>
    </div>
  `;
  return L.divIcon({
    html,
    className: '',
    iconSize: [44, 72],
    iconAnchor: [22, 50],
    popupAnchor: [0, -70]
  });
}

// Add markers
lugares.forEach((lugar, i) => {
  const marker = L.marker([lugar.lat, lugar.lng], {
    icon: createIcon(lugar),
    zIndexOffset: 100 + i
  }).addTo(map);

  marker.on('click', () => openCard(lugar));
});

// ── CARD LOGIC ────────────────────────────────────────────────────────────
let currentLugar = null;

function openCard(lugar) {
  currentLugar = lugar;

  // Mark as visited
  if (!visited.has(lugar.id)) {
    visited.add(lugar.id);
    document.getElementById('visited-count').textContent = visited.size;
    showToast(`¡${lugar.nombre} descubierto! 🎉`);
  }

  // Pan map to marker (offset upward so card doesn't cover it)
  map.panTo([lugar.lat - 0.003, lugar.lng], { animate: true, duration: 0.5 });

  // Build card content
  const metaChips = lugar.meta.map(m => `<div class="meta-chip">${m}</div>`).join('');

  document.getElementById('card-content').innerHTML = `
    <div class="card-category" style="background:${lugar.catColor}22; color:${lugar.catColor}; border: 1px solid ${lugar.catColor}44">
      ${lugar.catLabel}
    </div>
    <div class="card-name">${lugar.nombre}</div>
    <div class="card-subtitle">${lugar.subtitulo}</div>
    <div class="card-divider"></div>
    <div class="card-desc">${lugar.desc}</div>
    <div class="card-tip">${lugar.tip}</div>
    <div class="card-meta">${metaChips}</div>
    <button class="btn-close" onclick="closeCard()">Cerrar</button>
  `;

  document.getElementById('detail-card').classList.add('open');
  document.getElementById('overlay').classList.add('active');
}

function closeCard() {
  document.getElementById('detail-card').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── SWIPE TO CLOSE ────────────────────────────────────────────────────────
let startY = 0;
document.getElementById('detail-card').addEventListener('touchstart', e => {
  startY = e.touches[0].clientY;
}, { passive: true });

document.getElementById('detail-card').addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - startY;
  if (dy > 60) closeCard();
}, { passive: true });

// ── WELCOME TOAST ─────────────────────────────────────────────────────────
setTimeout(() => {
  showToast('Toca un marcador para explorar 🦋');
}, 800);
</script>
</body>
